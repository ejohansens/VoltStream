spring.application.name=pricing-service
server.port=8080

# --- RabbitMQ Connection ---
# Matches the service name in docker-compose
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# --- PostgreSQL Connection (Pricing DB) ---
# Points to the 'postgres-pricing' container
spring.datasource.url=jdbc:postgresql://postgres-pricing:5432/pricing_db
spring.datasource.username=pricing_user
spring.datasource.password=pricing_password

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true